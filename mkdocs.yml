site_name: DELTA-Hub 2026 Data Science Workshop
site_description: Data Science & AI-Assisted Coding for the Danube Delta — 22-23 May 2026
site_url: https://deltahub-ub.github.io/delta-hub-workshop-2026/
site_author: DELTA-Hub

repo_url: https://github.com/DeltaHUB-UB/delta-hub-workshop-2026
repo_name: delta-hub-workshop-2026
edit_uri: edit/main/docs/

copyright: |
  &copy; 2026 DELTA-Hub · University of Bucharest ·
  <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>

theme:
  name: material
  language: en

  logo: assets/Delta-HubWebsite1.png
  favicon: assets/favicon.svg

  palette:
    scheme: slate
    primary: custom
    accent: custom

  font:
    text: Space Grotesk
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - announce.dismiss

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Permanent link

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: EN
          build: true
          site_name: DELTA-Hub 2026 Data Science Workshop
          site_description: Data Science & AI-Assisted Coding for the Danube Delta — 22-23 May 2026
        - locale: ro
          name: RO
          build: true
          site_name: Workshop DELTA-Hub 2026 — Data Science
          site_description: Data Science & AI-Assisted Coding pentru Delta Dunării — 22-23 mai 2026
          theme:
            language: ro
          nav_translations:
            Home: Acasă
            Program: Program
            InfoDelta: InfoDelta
            Modules: Module
            Projects: Proiecte
            Resources: Resurse

nav:
  - Home: index.md
  - Program: program.md
  - InfoDelta: info-delta.md
  - Modules:
      - modules/module1-databases.md
      - modules/module2-python.md
      - modules/module3-statistics.md
      - modules/module4-ai-coding.md
  - Projects: projects.md
  - Resources: resources.md

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  homepage: https://delta-hub.unibuc.ro/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DeltaHUB-UB/delta-hub-workshop-2026
      name: Source on GitHub
    - icon: fontawesome/solid/globe
      link: https://delta-hub.unibuc.ro/
      name: DELTA-Hub website
